<main>
  @if (article()) {
    <app-article-card viewMode="article" [article]="article()!" (ratingChanged)="changeArticleRating($event)"></app-article-card>
  } @else {
    <p>Загрузка статьи...</p>
  }

  <app-comments [comments]="comments()" (ratingChanged)="changeCommentRating($event)"></app-comments>

  <app-comment-form (save)="saveComment($event)"></app-comment-form>
</main>
