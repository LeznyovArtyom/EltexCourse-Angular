<section class="hobby-projects">
  <div class="projects-header">
    <h1>Индивидуальные проекты</h1>
    <p class="description">Здесь представлены мои учебные проекты и личные разработки.</p>
  </div>
  <div class="projects-grid">
    @for (project of projects; track $index) {
      <div class="project-card">
        <div class="overlay">
          <h2>{{ project.name }}</h2>
          <p>{{ project.description }}</p>
        </div>
      </div>
    }
  </div>
</section>
